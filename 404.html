<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | ADV Digital Marketing</title>
  <meta name="robots" content="noindex" />
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF8F3;
      --black: #0D0D0D;
      --stone: #9A9490;
      --charcoal: #2B2B2B;
      --gold: #D4A853;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      line-height: 1.7;
    }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(96px, 18vw, 180px);
      font-weight: 300;
      color: rgba(212,168,83,0.35);
      line-height: 1;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 400;
      color: var(--black);
      margin: 16px 0 12px;
    }
    h1 em { font-style: italic; color: var(--gold); }
    p { color: var(--stone); max-width: 420px; margin: 0 auto 32px; font-size: 15px; }
    .links { display: flex; flex-wrap: wrap; gap: 12px 28px; justify-content: center; }
    .links a {
      color: var(--gold);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(212,168,83,0.4);
      padding-bottom: 3px;
    }
    .links a:hover { color: var(--black); border-color: var(--black); }
    .home-cta {
      display: inline-block;
      background: var(--black);
      color: var(--cream);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 16px 40px;
      margin-bottom: 40px;
    }
    .home-cta:hover { background: var(--charcoal); }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>This page moved — or never <em>existed.</em></h1>
    <p>The page you're looking for isn't here. Head back home, or jump straight to one of our services.</p>
    <a class="home-cta" href="/">Back to Home</a>
    <nav class="links">
      <a href="/meta-ads-agency-malaysia">Meta Ads</a>
      <a href="/google-ads-agency-malaysia">Google Ads</a>
      <a href="/seo-agency-kuala-lumpur">SEO &amp; AEO</a>
      <a href="/ai-marketing-automation-malaysia">AI Automation</a>
      <a href="/about">About</a>
    </nav>
  </main>
</body>
</html>
